<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>A-1 Split + Quick Edit</title>
  <style>
    :root {
      --bg: #f4f4f5;
      --panel: #ffffff;
      --line: #d4d4d8;
      --text: #18181b;
      --muted: #71717a;
      --accent: #2563eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Malgun Gothic", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 16px;
    }
    .dialog {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 10px;
      overflow: hidden;
      max-width: 1280px;
      margin: 0 auto;
    }
    .titlebar, .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: #fafafa;
    }
    .footer {
      border-bottom: 0;
      border-top: 1px solid var(--line);
    }
    .titlebar h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }
    .titlebar p, .footer p, .hint {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }
    .btn-row, .toolbar, .editor-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .btn {
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
    }
    .btn.primary {
      background: #eff6ff;
      border-color: #bfdbfe;
      color: var(--accent);
    }
    .body {
      display: grid;
      grid-template-columns: 180px minmax(0, 1fr);
      min-height: 620px;
    }
    .sidebar {
      border-right: 1px solid var(--line);
      padding: 12px;
      background: #fafafa;
    }
    .side-title {
      margin: 0 0 8px;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
    }
    .cat {
      width: 100%;
      text-align: left;
      padding: 9px 10px;
      margin-bottom: 6px;
      border: 1px solid transparent;
      border-radius: 6px;
      background: transparent;
      font-size: 14px;
    }
    .cat.active {
      background: #eff6ff;
      border-color: #bfdbfe;
      color: var(--accent);
      font-weight: 600;
    }
    .main {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-width: 0;
    }
    .toolbar {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: #fff;
      justify-content: space-between;
    }
    .toolbar-left {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      min-width: 0;
      flex: 1;
    }
    input, select {
      height: 34px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      font-size: 13px;
      background: #fff;
    }
    .search {
      width: 280px;
      max-width: 100%;
    }
    .table-wrap {
      overflow: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
    }
    th {
      background: #fafafa;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }
    tr.active {
      background: #f5f9ff;
    }
    .editor {
      border-top: 1px solid var(--line);
      padding: 12px 14px;
      background: #fafafa;
    }
    .editor-grid {
      display: grid;
      grid-template-columns: 120px 1fr 120px 1fr;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }
    .label {
      font-size: 13px;
      color: var(--muted);
    }
    .footer p strong {
      color: var(--text);
    }
    @media (max-width: 900px) {
      .body { grid-template-columns: 1fr; }
      .sidebar { border-right: 0; border-bottom: 1px solid var(--line); }
      .editor-grid { grid-template-columns: 1fr; }
      .titlebar, .toolbar, .footer { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>
  <div class="dialog">
    <div class="titlebar">
      <div>
        <h1>전역 변수 관리</h1>
        <p>추천안. 카테고리 선택, 목록 확인, 하단 빠른 수정만 남긴 구조</p>
      </div>
      <div class="btn-row">
        <button class="btn">닫기</button>
      </div>
    </div>

    <div class="body">
      <aside class="sidebar">
        <p class="side-title">카테고리</p>
        <button class="cat active">Sleep</button>
        <button class="cat">Region</button>
        <button class="cat">Color</button>
        <button class="cat">Key</button>
        <button class="cat">Value</button>
      </aside>

      <section class="main">
        <div class="toolbar">
          <div class="toolbar-left">
            <input class="search" type="search" placeholder="변수명 또는 값 검색">
            <button class="btn">정렬</button>
          </div>
          <div class="btn-row">
            <button class="btn">삭제</button>
            <button class="btn primary">새 변수 추가</button>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th style="width:48px;">#</th>
                <th style="width:220px;">이름</th>
                <th>값</th>
              </tr>
            </thead>
            <tbody>
              <tr class="active">
                <td>1</td>
                <td>human_gap</td>
                <td>80-150</td>
              </tr>
              <tr>
                <td>2</td>
                <td>loot_wait</td>
                <td>240</td>
              </tr>
              <tr>
                <td>3</td>
                <td>safe_pause</td>
                <td>500-700</td>
              </tr>
              <tr>
                <td>4</td>
                <td>retry_sleep</td>
                <td>1200</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="editor">
          <div class="editor-grid">
            <div class="label">카테고리</div>
            <select>
              <option>Sleep</option>
              <option>Region</option>
              <option>Color</option>
              <option>Key</option>
              <option>Value</option>
            </select>
            <div class="label">이름</div>
            <input type="text" value="human_gap">
            <div class="label">값</div>
            <input type="text" value="80-150">
            <div class="label">메모</div>
            <input type="text" placeholder="선택 사항, 없어도 됨">
          </div>
          <div class="editor-actions">
            <button class="btn">선택 항목 삭제</button>
            <button class="btn">새 항목으로 추가</button>
            <button class="btn primary">현재 항목 저장</button>
          </div>
        </div>
      </section>
    </div>

    <div class="footer">
      <p><strong>핵심 포인트:</strong> 우측 정보 패널 없이도 바로 선택하고 아래에서 수정 후 저장</p>
      <div class="btn-row">
        <button class="btn">취소</button>
        <button class="btn">적용</button>
        <button class="btn primary">저장하고 닫기</button>
      </div>
    </div>
  </div>
</body>
</html>
